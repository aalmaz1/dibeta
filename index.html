<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PhoneTracker • GPS Dashboard</title>
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── AUTH SCREEN ─────────────────────────── -->
<div id="auth-screen" class="screen active">
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">📍</div>
            <h1>PhoneTracker</h1>
            <p>Real-time GPS dashboard</p>
        </div>

        <div class="auth-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button id="auth-btn" class="btn-primary">Sign In</button>
            <div class="auth-toggle">
                <span id="auth-mode">Don't have an account?</span>
                <button id="toggle-btn" class="link-btn">Sign Up</button>
            </div>
        </div>

        <p class="auth-hint">Use the same email you entered in the PhoneTracker app</p>
    </div>
</div>

<!-- ─── DASHBOARD SCREEN ─────────────────────── -->
<div id="dashboard-screen" class="screen">

    <!-- Header -->
    <div class="app-header">
        <div class="header-left">
            <button class="icon-btn" onclick="window.fitAllDevices()" title="Fit all devices">⊕</button>
        </div>
        <div class="header-center">
            <div class="status-badge">
                <span class="status-dot offline"></span>
                <span id="header-status">Connecting…</span>
            </div>
        </div>
        <div class="header-right" style="display:flex;justify-content:flex-end">
            <button id="logout-btn" class="icon-btn" title="Logout">⏏</button>
        </div>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Device panel -->
    <div class="device-panel">
        <div class="panel-header">
            <h3>Devices</h3>
            <span class="badge" id="device-count">0</span>
        </div>
        <div class="device-list" id="devices-list">
            <div class="empty-state">
                <div style="font-size:36px;margin-bottom:12px">📡</div>
                <div>Waiting for devices…</div>
            </div>
        </div>
    </div>

    <!-- User bar -->
    <div class="user-bar">
        Logged in as <b id="user-email"></b>
    </div>
</div>

<!-- ─── NOTIFICATIONS ────────────────────────── -->
<div id="notifications"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
