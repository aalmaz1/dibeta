<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Phone Tracker • GPS Dashboard</title>
    <meta name="description" content="Real-time phone tracking dashboard">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23007AFF'/%3E%3Ccircle cx='50' cy='50' r='25' fill='none' stroke='white' stroke-width='8'/%3E%3Ccircle cx='50' cy='50' r='8' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <div class="logo">
                <div class="logo-icon">📍</div>
                <h1>Phone Tracker</h1>
                <p>Real-time GPS Tracking</p>
            </div>
            
            <form id="auth-form" class="auth-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary" id="login-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader hidden">⟳</span>
                </button>
                
                <div class="auth-toggle">
                    <span id="auth-mode-text">Don't have an account?</span>
                    <button type="button" id="auth-toggle-btn" class="link-btn">Sign Up</button>
                </div>
            </form>
            
            <p class="auth-hint">Use the same email on your Android device</p>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="screen">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="status-badge">
                    <div class="status-dot online"></div>
                    <span id="connection-status">Connected</span>
                </div>
            </div>
            <div class="header-center">
                <h2>My Devices</h2>
            </div>
            <div class="header-right">
                <button id="logout-btn" class="icon-btn" title="Logout">🚪</button>
            </div>
        </header>

        <!-- Map Container -->
        <div id="map"></div>

        <!-- Device List Panel -->
        <div class="device-panel">
            <div class="panel-header">
                <h3>Devices</h3>
                <span id="device-count" class="badge">0</span>
            </div>
            <div id="device-list" class="device-list">
                <!-- Devices will be rendered here -->
            </div>
        </div>

        <!-- User Info -->
        <div class="user-bar">
            <span id="user-email">user@email.com</span>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notifications"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>
    
    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW error:', err));
        }
    </script>
</body>
</html>
